name: CI Pipeline — DevBoard

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 182138815046.dkr.ecr.ap-south-1.amazonaws.com
  BACKEND_IMAGE: chatapp-backend
  FRONTEND_IMAGE: chatapp-frontend

jobs:
  # ─── Job 1: Test ────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        working-directory: app/devboard-app/backend
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        working-directory: app/chatapp/backend
        run: pytest tests.py -v
        env:
          DATABASE_URL: "sqlite:///:memory:"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/chatapp/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/chatapp/frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: app/chatapp/frontend
        run: npm test || true

  # ─── Job 2: Build + Scan + Push ─────────────────────────────
  build-and-push:
    name: Build, Scan & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend image
        working-directory: app/chatapp/backend
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_IMAGE:${{ steps.tag.outputs.IMAGE_TAG }} .
          docker tag $ECR_REGISTRY/$BACKEND_IMAGE:${{ steps.tag.outputs.IMAGE_TAG }} \
            $ECR_REGISTRY/$BACKEND_IMAGE:latest

      - name: Build Frontend image
        working-directory: app/chatapp/frontend
        run: |
          docker build -t $ECR_REGISTRY/$FRONTEND_IMAGE:${{ steps.tag.outputs.IMAGE_TAG }} .
          docker tag $ECR_REGISTRY/$FRONTEND_IMAGE:${{ steps.tag.outputs.IMAGE_TAG }} \
            $ECR_REGISTRY/$FRONTEND_IMAGE:latest

      - name: Trivy scan — Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.IMAGE_TAG }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Trivy scan — Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.IMAGE_TAG }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Push Backend to ECR
        run: |
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:${{ steps.tag.outputs.IMAGE_TAG }}
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:latest

      - name: Push Frontend to ECR
        run: |
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:${{ steps.tag.outputs.IMAGE_TAG }}
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:latest

      - name: Update image tag in GitLab infra-config
        run: |
          git clone https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/kishorgavhane.dev/gitops-config.git
          cd gitops-config
          sed -i "s|tag: latest|tag: ${{ steps.tag.outputs.IMAGE_TAG }}|g" helm/app-chart/values.yaml
          git config user.email "kishorgavhane.dev@gmail.com"
          git config user.name "GitHub Actions"
          git add helm/app-chart/values.yaml
          git commit -m "ci: update image tag to ${{ steps.tag.outputs.IMAGE_TAG }}"
          git push
